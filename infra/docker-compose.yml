version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: agendainteligente_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Habilitar persistência (Append Only File) e opcionalmente uma senha
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    restart: unless-stopped

volumes:
  redis_data:
