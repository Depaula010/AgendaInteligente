<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Fundo sólido — necessário para maskable icon -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Calendário centralizado com safe zone (10% padding = 51px cada lado) -->
  <!-- Área útil: 51..461 = 410px. Calendário ocupa ~260px centralizado -->
  <g transform="translate(126, 106)">
    <!-- Corpo do calendário -->
    <rect x="0" y="40" width="260" height="220" rx="16" fill="#1e293b" stroke="#334155" stroke-width="6"/>

    <!-- Header do calendário -->
    <rect x="0" y="40" width="260" height="64" rx="16" fill="#0ea5e9"/>
    <rect x="0" y="80" width="260" height="28" fill="#0ea5e9"/>

    <!-- Pinos do calendário -->
    <rect x="72" y="20" width="16" height="44" rx="8" fill="#7dd3fc"/>
    <rect x="172" y="20" width="16" height="44" rx="8" fill="#7dd3fc"/>

    <!-- Grade de dias — 3 linhas x 4 colunas -->
    <!-- Linha 1 -->
    <rect x="20" y="132" width="32" height="32" rx="8" fill="#334155"/>
    <rect x="72" y="132" width="32" height="32" rx="8" fill="#334155"/>
    <rect x="124" y="132" width="32" height="32" rx="8" fill="#0ea5e9"/>
    <rect x="176" y="132" width="32" height="32" rx="8" fill="#334155"/>
    <!-- Linha 2 -->
    <rect x="20" y="180" width="32" height="32" rx="8" fill="#334155"/>
    <rect x="72" y="180" width="32" height="32" rx="8" fill="#334155"/>
    <rect x="124" y="180" width="32" height="32" rx="8" fill="#334155"/>
    <rect x="176" y="180" width="32" height="32" rx="8" fill="#334155"/>
    <!-- Linha 3 -->
    <rect x="20" y="228" width="32" height="32" rx="8" fill="#334155"/>
    <rect x="72" y="228" width="32" height="32" rx="8" fill="#334155"/>
  </g>
</svg>
